syntax = "proto3";

package retrom;

import "retrom/models/emulator-packages.proto";
import "retrom/models/emulators.proto";

service EmulatorPackageService {
  rpc GetEmulatorPackages(GetEmulatorPackagesRequest) returns (GetEmulatorPackagesResponse);
  rpc GetEmulatorPackageFiles(GetEmulatorPackageFilesRequest) returns (GetEmulatorPackageFilesResponse);
  rpc UpdateEmulatorPackages(UpdateEmulatorPackagesRequest) returns (UpdateEmulatorPackagesResponse);
  rpc GetEmulatorCatalog(GetEmulatorCatalogRequest) returns (GetEmulatorCatalogResponse);
  rpc CheckEmulatorPackageDirectoryWritable(CheckEmulatorPackageDirectoryWritableRequest) returns (CheckEmulatorPackageDirectoryWritableResponse);
  rpc InstallCatalogPackage(InstallCatalogPackageRequest) returns (InstallCatalogPackageResponse);
  rpc LinkEmulatorToPackage(LinkEmulatorToPackageRequest) returns (LinkEmulatorToPackageResponse);
  rpc DeleteEmulatorPackages(DeleteEmulatorPackagesRequest) returns (DeleteEmulatorPackagesResponse);
}

message GetEmulatorPackagesRequest {
  repeated int32 ids = 1;
  optional string package_slug = 2;
  optional string catalog_id = 3;
}

message GetEmulatorPackagesResponse {
  repeated EmulatorPackage packages = 1;
  map<string, int32> latest_package_id_by_slug = 2;
}

message GetEmulatorPackageFilesRequest {
  int32 package_id = 1;
}

message GetEmulatorPackageFilesResponse {
  repeated EmulatorPackageFile files = 1;
}

message UpdateEmulatorPackagesRequest {}

message UpdateEmulatorPackagesResponse {
  repeated string job_ids = 1;
}

message GetEmulatorCatalogRequest {}

message GetEmulatorCatalogResponse {
  repeated EmulatorCatalogEntry entries = 1;
  // Server host OS — clients use with `recommended_operating_system` per entry.
  Emulator.OperatingSystem host_operating_system = 2;
}

message CheckEmulatorPackageDirectoryWritableRequest {
  uint32 directory_index = 1;
}

message CheckEmulatorPackageDirectoryWritableResponse {
  bool writable = 1;
  optional string error_message = 2;
}

message InstallCatalogPackageRequest {
  string catalog_id = 1;
  uint32 directory_index = 2;
  optional string subpath = 3;
  int32 client_id = 4;
  // When unset, installs the entry's `recommended_operating_system` for this host.
  optional Emulator.OperatingSystem target_operating_system = 5;
}

message InstallCatalogPackageResponse {
  string job_id = 1;
}

message LinkEmulatorToPackageRequest {
  int32 emulator_id = 1;
  int32 package_id = 2;
  int32 client_id = 3;
  optional bool managed_paths = 4;
}

message LinkEmulatorToPackageResponse {
  LocalEmulatorConfig local_config = 1;
}

message DeleteEmulatorPackagesRequest {
  repeated int32 package_ids = 1;
  optional bool delete_files = 2;
}

message DeleteEmulatorPackagesResponse {
  repeated int32 deleted_package_ids = 1;
}
