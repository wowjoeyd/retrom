syntax = "proto3";

package retrom;

import "google/protobuf/timestamp.proto";
import 'retrom/models/games.proto';
import 'retrom/models/metadata.proto';
import 'retrom/models/platforms.proto';
import 'retrom/providers/igdb.proto';

service MetadataService {
  rpc GetGameMetadata(GetGameMetadataRequest) returns (GetGameMetadataResponse);
  rpc UpdateGameMetadata(UpdateGameMetadataRequest) returns (UpdateGameMetadataResponse);
  // Record a play session's playtime + last-played ONLY. Unlike
  // UpdateGameMetadata this does not wipe/re-cache the game's media or re-extract
  // theme audio — used by the launcher when a game exits.
  rpc UpdateGamePlaytime(UpdateGamePlaytimeRequest) returns (UpdateGamePlaytimeResponse);

  rpc GetPlatformMetadata(GetPlatformMetadataRequest) returns (GetPlatformMetadataResponse);
  rpc UpdatePlatformMetadata(UpdatePlatformMetadataRequest) returns (UpdatePlatformMetadataResponse);

  rpc GetIgdbSearch(GetIgdbSearchRequest) returns (GetIgdbSearchResponse);
  rpc GetIgdbGameSearchResults(GetIgdbGameSearchResultsRequest) returns (GetIgdbGameSearchResultsResponse);
  rpc GetIgdbPlatformSearchResults(GetIgdbPlatformSearchResultsRequest) returns (GetIgdbPlatformSearchResultsResponse);

  rpc SyncSteamMetadata(SyncSteamMetadataRequest) returns (SyncSteamMetadataResponse);

  // Unified achievements (Steam + RetroAchievements). The server resolves which
  // provider applies to the game, fetches the set + the user's progress, caches
  // it, and serves it through this single RPC.
  rpc GetGameAchievements(GetGameAchievementsRequest) returns (GetGameAchievementsResponse);

  rpc SearchGameSoundtrack(SearchGameSoundtrackRequest) returns (SearchGameSoundtrackResponse);
  rpc DownloadGameSoundtrack(DownloadGameSoundtrackRequest) returns (DownloadGameSoundtrackResponse);
  rpc AutoDownloadGameSoundtrack(AutoDownloadGameSoundtrackRequest) returns (AutoDownloadGameSoundtrackResponse);
  rpc DeleteGameSoundtrackTrack(DeleteGameSoundtrackTrackRequest) returns (DeleteGameSoundtrackTrackResponse);

  rpc GetLocalMetadataStatus(GetLocalMetadataStatusRequest) returns (GetLocalMetadataStatusResponse);
  rpc DeleteLocalMetadata(DeleteLocalMetadataRequest) returns (DeleteLocalMetadataResponse);
}

message GetGameMetadataRequest {
  repeated int32 game_ids = 1;
}

message GetGameMetadataResponse {
  message GameGenres {
    repeated GameGenre value = 1;
  }

  message SimilarGames {
    repeated Game value = 1;
  }

  // paths to media assets, relative to the global metadata dir or served HTTP endpoints
  message MediaPaths {
    optional string cover_url = 1;
    optional string background_url = 2;
    optional string icon_url = 3;
    repeated string video_urls = 4;
    repeated string screenshot_urls = 5;
    repeated string artwork_urls = 6;
    // The primary theme track (first in the playlist), kept for backward compat.
    optional string theme_audio_url = 7;
    // The full theme playlist: parallel arrays of track URLs and their display
    // titles (resolved from each file's embedded Opus TITLE tag, else "Theme").
    repeated string theme_audio_urls = 8;
    repeated string theme_audio_titles = 9;
  }

  repeated GameMetadata metadata = 1;
  map<int32, SimilarGames> similar_games = 2;
  map<int32, GameGenres> genres = 3;
  map<int32, MediaPaths> media_paths = 4;
}

message GetPlatformMetadataRequest {
  repeated int32 platform_ids = 1;
}

message GetPlatformMetadataResponse {
  repeated PlatformMetadata metadata = 1;
}

message GetIgdbGameSearchResultsRequest {
  IgdbGameSearchQuery query = 1;
}

message GetIgdbGameSearchResultsResponse {
  repeated NewGameMetadata metadata = 1;
}

message UpdateGameMetadataRequest {
  repeated UpdatedGameMetadata metadata = 1;
  // When true, re-download/re-extract the theme audio even if a file already exists.
  optional bool overwrite_theme_audio = 2;
}

message UpdateGameMetadataResponse {
  repeated GameMetadata metadata_updated = 1;
}

message UpdateGamePlaytimeRequest {
  int32 game_id = 1;
  // Minutes to add to the game's recorded total for this session.
  int32 additional_minutes = 2;
}

message UpdateGamePlaytimeResponse {}

message GetIgdbPlatformSearchResultsRequest {
  IgdbPlatformSearchQuery query = 1;
}

message GetIgdbPlatformSearchResultsResponse {
  repeated NewPlatformMetadata metadata = 1;
}

message UpdatePlatformMetadataRequest {
  repeated UpdatedPlatformMetadata metadata = 1;
}

message UpdatePlatformMetadataResponse {
  repeated PlatformMetadata metadata_updated = 1;
}

// Arbitrary search query for IGDB
message GetIgdbSearchRequest {
  enum IgdbSearchType {
    GAME = 0;
    PLATFORM = 1;
  }

  IgdbSearchType search_type = 1;
  optional IgdbSearch search = 2;
  optional IgdbPagination pagination = 3;
  optional IgdbFilters filters = 4;
  optional IgdbFields fields = 5;
}

message IgdbSearchGameResponse {
  repeated NewGameMetadata games = 1;
}

message IgdbSearchPlatformResponse {
  repeated NewPlatformMetadata platforms = 1;
}

message GetIgdbSearchResponse {
  oneof search_results {
    IgdbSearchGameResponse game_matches = 1;
    IgdbSearchPlatformResponse platform_matches = 2;
  }
}

message SyncSteamMetadataRequest {
  message Selector {
    int32 game_id = 1;
  }

  repeated Selector selectors = 1;
  // When true, re-fetch all Steam metadata (name, description, screenshots,
  // videos, etc.) for each selected game, not just playtime/last-played.
  optional bool force_refresh = 2;
}

message SyncSteamMetadataResponse {}

// Resolved state of a game's achievements, decided server-side.
enum GameAchievementsStatus {
  GAME_ACHIEVEMENTS_STATUS_UNSPECIFIED = 0;
  // No achievement provider applies to this game (native/custom title).
  GAME_ACHIEVEMENTS_STATUS_NOT_SUPPORTED = 1;
  // A provider applies but its account credentials are missing/incomplete.
  GAME_ACHIEVEMENTS_STATUS_NOT_CONFIGURED = 2;
  // RetroAchievements: the content hash did not resolve to an RA game.
  GAME_ACHIEVEMENTS_STATUS_NOT_IDENTIFIED = 3;
  // Configured but the provider could not return progress (e.g. a private Steam
  // profile, a bad key, or an upstream error). `message` carries the detail.
  GAME_ACHIEVEMENTS_STATUS_NEEDS_ATTENTION = 4;
  // A provider applies and is configured, but the game has no achievement set.
  GAME_ACHIEVEMENTS_STATUS_EMPTY = 5;
  // Achievements resolved; `set` is populated.
  GAME_ACHIEVEMENTS_STATUS_POPULATED = 6;
}

message GameAchievement {
  // Provider-native achievement id (Steam apiname / RA achievement id).
  string id = 1;
  string name = 2;
  string description = 3;
  bool unlocked = 4;
  // RA awards points per achievement; Steam does not.
  optional int32 points = 5;
  // Global unlock percentage (rarity), when the provider supplies it.
  optional double rarity_percent = 6;
  // Badge image as a relative media path (served under /rest/public), already
  // resolved to the state-appropriate (unlocked vs locked) art.
  optional string icon_url = 7;
  optional google.protobuf.Timestamp unlocked_at = 8;
}

message GameAchievementSet {
  // Provider id: "steam" | "retroachievements".
  string provider = 1;
  int32 unlocked = 2;
  int32 total = 3;
  int32 points_earned = 4;
  int32 points_total = 5;
  repeated GameAchievement achievements = 6;
}

message GetGameAchievementsRequest {
  int32 game_id = 1;
  // Bypass the cache TTL and re-fetch from the provider.
  optional bool force_refresh = 2;
}

message GetGameAchievementsResponse {
  GameAchievementsStatus status = 1;
  optional GameAchievementSet set = 2;
  // Human-readable detail for NEEDS_ATTENTION / error states.
  optional string message = 3;
}

message GetLocalMetadataStatusRequest {}

message GetLocalMetadataStatusResponse {
  int64 total_byte_size = 1;
  int32 total_files = 2;
}

message DeleteLocalMetadataRequest {}

message DeleteLocalMetadataResponse {}

message SoundtrackCandidate {
  string video_id = 1;
  string title = 2;
  int32 duration_secs = 3;
  string thumbnail_url = 4;
}

message SearchGameSoundtrackRequest {
  int32 game_id = 1;
}

message SearchGameSoundtrackResponse {
  repeated SoundtrackCandidate candidates = 1;
}

message DownloadGameSoundtrackRequest {
  int32 game_id = 1;
  string video_id = 2;
}

message DownloadGameSoundtrackResponse {
  string job_id = 1;
}

// Delete a single downloaded theme track from a game's playlist. `filename` is
// the track file's name (e.g. "theme.opus" / "theme-2.opus"), as derived from
// the track URL the client holds.
message DeleteGameSoundtrackTrackRequest {
  int32 game_id = 1;
  string filename = 2;
}

message DeleteGameSoundtrackTrackResponse {}

// Auto-search YouTube and download theme audio for any of the given games that
// don't already have a theme file.  Used for batch (Phase 3) and auto (Phase 4).
message AutoDownloadGameSoundtrackRequest {
  repeated int32 game_ids = 1;
}

message AutoDownloadGameSoundtrackResponse {
  string job_id = 1;
}
