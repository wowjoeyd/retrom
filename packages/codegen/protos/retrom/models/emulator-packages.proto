syntax = "proto3";

package retrom;

import "google/protobuf/timestamp.proto";
import "retrom/models/emulators.proto";

enum EmulatorPackageStatus {
  EMULATOR_PACKAGE_STATUS_UNSPECIFIED = 0;
  EMULATOR_PACKAGE_STATUS_HEALTHY = 1;
  EMULATOR_PACKAGE_STATUS_DEGRADED = 2;
  EMULATOR_PACKAGE_STATUS_MISSING = 3;
}

message EmulatorPackage {
  int32 id = 1;
  string package_slug = 2;
  string version = 3;
  string display_name = 4;
  optional string catalog_id = 5;
  Emulator.OperatingSystem os = 6;
  string root_path = 7;
  string manifest_sha256 = 8;
  string executable_rel = 9;
  EmulatorPackageStatus status = 10;
  bool is_deleted = 11;
  optional google.protobuf.Timestamp deleted_at = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message NewEmulatorPackage {
  string package_slug = 1;
  string version = 2;
  string display_name = 3;
  optional string catalog_id = 4;
  Emulator.OperatingSystem os = 5;
  string root_path = 6;
  string manifest_sha256 = 7;
  string executable_rel = 8;
  EmulatorPackageStatus status = 9;
  optional bool is_deleted = 10;
  optional google.protobuf.Timestamp deleted_at = 11;
  optional google.protobuf.Timestamp created_at = 12;
  optional google.protobuf.Timestamp updated_at = 13;
}

message UpdatedEmulatorPackage {
  int32 id = 1;
  optional string package_slug = 2;
  optional string version = 3;
  optional string display_name = 4;
  optional string catalog_id = 5;
  optional Emulator.OperatingSystem os = 6;
  optional string root_path = 7;
  optional string manifest_sha256 = 8;
  optional string executable_rel = 9;
  optional EmulatorPackageStatus status = 10;
  optional bool is_deleted = 11;
  optional google.protobuf.Timestamp deleted_at = 12;
  optional google.protobuf.Timestamp created_at = 13;
  optional google.protobuf.Timestamp updated_at = 14;
}

message EmulatorPackageFile {
  int32 id = 1;
  int32 package_id = 2;
  string relative_path = 3;
  int64 byte_size = 4;
  string sha256 = 5;
  string absolute_path = 6;
  google.protobuf.Timestamp file_modified_at = 7;
  bool optional = 8;
  bool is_deleted = 9;
  optional google.protobuf.Timestamp deleted_at = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message NewEmulatorPackageFile {
  int32 package_id = 1;
  string relative_path = 2;
  int64 byte_size = 3;
  string sha256 = 4;
  string absolute_path = 5;
  google.protobuf.Timestamp file_modified_at = 6;
  bool optional = 7;
  optional bool is_deleted = 8;
  optional google.protobuf.Timestamp deleted_at = 9;
  optional google.protobuf.Timestamp created_at = 10;
  optional google.protobuf.Timestamp updated_at = 11;
}

message UpdatedEmulatorPackageFile {
  int32 id = 1;
  optional int32 package_id = 2;
  optional string relative_path = 3;
  optional int64 byte_size = 4;
  optional string sha256 = 5;
  optional string absolute_path = 6;
  optional google.protobuf.Timestamp file_modified_at = 7;
  optional bool optional = 8;
  optional bool is_deleted = 9;
  optional google.protobuf.Timestamp deleted_at = 10;
  optional google.protobuf.Timestamp created_at = 11;
  optional google.protobuf.Timestamp updated_at = 12;
}

message EmulatorCatalogUpstream {
  string type = 1;
  optional string repo = 2;
  optional string asset_pattern = 3;
  optional string manifest_version_from = 4;
  optional string url = 5;
}

message EmulatorCatalogInstall {
  string archive_type = 1;
  uint32 strip_components = 2;
  optional string executable_relative_path = 3;
  optional string executable_glob = 4;
  repeated string preserve_paths = 5;
}

message EmulatorCatalogDefaultProfile {
  string name = 1;
  repeated string supported_extensions = 2;
  repeated string custom_args = 3;
}

// Per-OS upstream source and install instructions. When `targets` is set, prefer
// the matching entry over legacy top-level `upstream` / `install`.
message EmulatorCatalogTarget {
  Emulator.OperatingSystem operating_system = 1;
  EmulatorCatalogUpstream upstream = 2;
  EmulatorCatalogInstall install = 3;
}

message EmulatorCatalogEntry {
  string catalog_id = 1;
  string display_name = 2;
  optional string description = 3;
  repeated string supported_platform_folder_names = 4;
  repeated Emulator.OperatingSystem operating_systems = 5;
  bool installable = 6;
  bool deprecated = 7;
  optional string legal_notice = 8;
  optional EmulatorCatalogDefaultProfile default_profile = 9;
  // Legacy single-target fields; populated from the first target when loading JSON
  // that only defines `targets`, or from top-level JSON for older overlays.
  EmulatorCatalogUpstream upstream = 10;
  EmulatorCatalogInstall install = 11;
  repeated EmulatorCatalogTarget targets = 12;
  // Populated at runtime: best target for the server host OS (see GetEmulatorCatalog).
  optional Emulator.OperatingSystem recommended_operating_system = 13;
}