syntax = "proto3";

package retrom;

import "google/protobuf/timestamp.proto";

message Client {
  int32 id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  // Whether this client can host Remote Play streams (Sunshine present).
  optional bool is_stream_host = 5;
  // Whether this client can view/stream Remote Play sessions (Moonlight present).
  optional bool is_stream_client = 6;
}

message NewClient {
  string name = 1;
  optional google.protobuf.Timestamp created_at = 2;
  optional google.protobuf.Timestamp updated_at = 3;
  optional bool is_stream_host = 4;
  optional bool is_stream_client = 5;
}

message UpdatedClient {
  int32 id = 1;
  optional string name = 2;
  optional google.protobuf.Timestamp created_at = 3;
  optional google.protobuf.Timestamp updated_at = 4;
  optional bool is_stream_host = 5;
  optional bool is_stream_client = 6;
}
