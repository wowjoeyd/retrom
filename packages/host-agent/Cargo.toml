[package]
name = "retrom-host-agent"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
edition.workspace = true
description = "Thin Sunshine-invoked agent that forwards run-pending-session to the running Retrom client"
rust-version = "1.80"

[[bin]]
name = "retrom-host-agent"
path = "src/main.rs"

[features]
# Dev-only `create-test-session` subcommand. Off by default so the bundled agent
# stays a thin std-only forwarder; enable with `--features dev` for local testing.
dev = ["dep:tokio", "dep:tonic", "dep:retrom-codegen"]

[dependencies]
tokio = { workspace = true, optional = true }
tonic = { workspace = true, optional = true }
retrom-codegen = { workspace = true, optional = true }
