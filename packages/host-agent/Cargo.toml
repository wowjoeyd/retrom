[package]
name = "retrom-host-agent"
version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
edition.workspace = true
description = "Sunshine-invoked agent that forwards run-pending-session to the running Retrom client and keeps the stream alive until the session ends"
rust-version = "1.80"

[[bin]]
name = "retrom-host-agent"
path = "src/main.rs"

[features]
# Dev-only `create-test-session` subcommand for local testing. The gRPC deps are
# always needed now (the agent watches the brokered session to keep the Sunshine
# stream alive), so this only gates the extra subcommand.
dev = []

[dependencies]
tokio = { workspace = true }
tonic = { workspace = true }
retrom-codegen = { workspace = true }
