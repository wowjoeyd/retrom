# Local/dev Flatpak manifest for the FORK's feat-remote-play-integration branch.
#
# Distinct app id (io.github.wowjoeyd.RetromDevel) so it installs SIDE-BY-SIDE and
# never clobbers an installed upstream io.github.jmberesford.Retrom. The binary is
# still `Retrom`; only the Flatpak id / desktop / metainfo / icon ids differ.
#
# Unlike the upstream manifest (io.github.jmberesford.Retrom.yml), which pulls
# prebuilt web-dist + vendored-cargo tarballs from JMBeresford release tags, this
# one builds the branch from source in-sandbox (the GNOME SDK's rust-stable +
# node22 extensions provide the toolchain, so the Steam Deck host needs no
# rust/node). It's meant for `flatpak-builder` on a Steam Deck in Desktop Mode.
#
# See design/remote-play/05-flatpak.md for build + install commands.

id: io.github.wowjoeyd.RetromDevel

runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: Retrom

finish-args:
  # flatpak-spawn --host: launch host emulators for local play AND -- for Remote
  # Play -- the Moonlight Flatpak. moonlight.rs wraps its Moonlight launch +
  # `flatpak info` check in `flatpak-spawn --host` under the `flatpak` feature
  # (enabled by the client's `flatpak` feature, used in the build below).
  - --talk-name=org.freedesktop.Flatpak

  # Retrom's own WebKitGTK UI -- this (runtime WebKitGTK + host GPU via --device=dri)
  # is what fixes the SteamOS white-screen the self-built AppImage hit.
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --device=input # gamepad / Steam Deck controls
  - --socket=pulseaudio # local-play emulator audio

  # Library + emulator executables on host, remote Retrom server + metadata.
  - --filesystem=host-os
  - --share=network

  - --env=FLATPAK=1

build-options:
  # /run/build/retrom/.local/bin holds the corepack-written `pnpm` shim (created in
  # the first build-command) so a REAL `pnpm` is on PATH for the whole build --
  # nested nx task scripts call bare `pnpm` (e.g. retrom-codegen:generate runs
  # `pnpm buf generate`), not `corepack pnpm`.
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin:/run/build/retrom/.local/bin
  # Dev build: allow the in-sandbox build to fetch npm + cargo deps online.
  # (Upstream is fully offline via vendored tarballs; this trades reproducibility
  # for not having to pre-stage artifacts.)
  build-args:
    - --share=network
  # The SDK prefix (/usr/lib/sdk) and $HOME are read-only in the build sandbox, so
  # point every tool's cache/store/registry at the writable build dir
  # (/run/build/<module> = /run/build/retrom). This is why `corepack enable` fails
  # (it tries to symlink a pnpm shim into /usr/lib/sdk/node22/bin); the build below
  # runs pnpm on-demand via `corepack pnpm` instead, which writes no shim.
  env:
    CARGO_HOME: /run/build/retrom/cargo
    XDG_CACHE_HOME: /run/build/retrom/.cache
    XDG_DATA_HOME: /run/build/retrom/.local/share
    COREPACK_HOME: /run/build/retrom/.cache/corepack
    # Don't block on an interactive "download pnpm?" prompt in the sandbox.
    COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    npm_config_cache: /run/build/retrom/.npm
    npm_config_store_dir: /run/build/retrom/.pnpm-store
    # node22 SDK extension is Node 22; the repo declares engines node>=24, but the
    # web + cargo toolchain runs on 22, so don't hard-fail the engine check.
    npm_config_engine_strict: "false"
    # nx in a one-shot sandbox: no cloud (would need auth), no background daemon,
    # and fully non-interactive -- CI mode skips the @nx/js typescript-sync prompt
    # (which has no TTY here and otherwise derails the web build) and disables the
    # terminal UI. This replicates the working GitHub CI web build.
    NX_NO_CLOUD: "true"
    NX_DAEMON: "false"
    CI: "true"
    NX_TUI: "false"

modules:
  - name: retrom
    buildsystem: simple
    sources:
      # Clean checkout of the local fork clone's branch (no node_modules/target
      # cruft). Switch to `url: https://github.com/wowjoeyd/retrom` to clone the
      # fork instead, or pin `commit:` for reproducibility.
      - type: git
        path: .
        branch: feat-remote-play-integration
    build-commands:
      # Pre-create the writable dirs we point tools at. corepack's
      # --install-directory must ALREADY exist (it realpath()s it -> ENOENT
      # otherwise, which is what failed on the Deck); the rest are belt-and-suspenders
      # so no tool trips over a missing cache/store dir.
      - mkdir -p /run/build/retrom/.local/bin /run/build/retrom/.local/share /run/build/retrom/.cache/corepack /run/build/retrom/cargo /run/build/retrom/.npm /run/build/retrom/.pnpm-store
      # Put a REAL `pnpm` on PATH for the whole build. `corepack enable` defaults to
      # symlinking into the read-only SDK bin (EROFS), so target a writable dir with
      # --install-directory; that dir is on PATH (above). The shim resolves the pnpm
      # version from the root package.json `packageManager` field (pnpm@10.26.1) and
      # caches under the writable COREPACK_HOME. This makes bare `pnpm` -- including
      # nested nx task scripts like `pnpm buf generate` -- work, not just the outer
      # `corepack pnpm`.
      - corepack enable --install-directory /run/build/retrom/.local/bin pnpm
      # Self-check: fail loudly here if bare `pnpm` isn't on PATH, before the nx build.
      - pnpm --version
      # Frontend: workspace deps + the desktop web client -> packages/client-web/dist
      # (referenced by tauri.conf.json `frontendDist`). buf, vite, nx, tsc etc. all
      # resolve from node_modules via pnpm once this install completes.
      - pnpm install --frozen-lockfile
      - pnpm nx run retrom-client-web:build:desktop
      # Guard: never reach cargo with an empty dist (tauri's generate_context!
      # frontendDist check fails late). Fail loudly here instead.
      - 'test -f packages/client-web/dist/index.html || { echo "FATAL: web build produced no packages/client-web/dist/index.html -- aborting before cargo build"; exit 1; }'

      # Desktop client. `flatpak` enables flatpak-spawn for host executables +
      # vendored protoc + the Moonlight flatpak-spawn wrapping; `custom-protocol`
      # is REQUIRED for a production (embedded-asset) build when calling cargo
      # directly instead of cargo-tauri -- without it the app would try the dev
      # server and white-screen.
      - cargo build --release -p retrom-client --features "flatpak,custom-protocol"

      # Install the binary + desktop integration under the distinct devel id.
      - install -Dm755 -t /app/bin/ target/release/Retrom
      - install -Dm644 -t /app/share/metainfo/ io.github.wowjoeyd.RetromDevel.metainfo.xml
      - install -Dm644 -t /app/share/applications/ io.github.wowjoeyd.RetromDevel.desktop
      - install -Dm644 packages/client/icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.wowjoeyd.RetromDevel.png
      - install -Dm644 packages/client/icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.wowjoeyd.RetromDevel.png
      - install -Dm644 packages/client/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/io.github.wowjoeyd.RetromDevel.png
      - install -Dm644 LICENSE /app/share/licenses/io.github.wowjoeyd.RetromDevel/LICENSE
